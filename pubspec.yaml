name: grassroots_dart_udx
description: >-
  Fork of dart_udx (QUIC-inspired reliable, multiplexed, congestion-controlled
  UDP streams) with raw datagram passthrough and richer send-error reporting,
  maintained for the Grassroots Networking transport layer.
version: 2.1.0
homepage: https://github.com/danbachar/dart-udx
repository: https://github.com/danbachar/dart-udx
issue_tracker: https://github.com/danbachar/dart-udx/issues

topics:
  - networking
  - udp
  - transport
  - quic
  - streaming

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  crypto: ^3.0.3
  collection: ^1.18.0
  meta: ^1.16.0

dev_dependencies:
  build_runner: ^2.4.9
  lints: ^3.0.0
  test: ^1.24.0
  mockito: ^5.4.4
